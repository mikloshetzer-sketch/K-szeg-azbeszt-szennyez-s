name: Kőszeg kutatási összefoglaló készítése

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/build-research-summary.js"
      - "data/research/koszeg-doc-search-results.json"
      - ".github/workflows/build-research-summary.yml"

permissions:
  contents: write

jobs:
  build-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Repo letöltése
        uses: actions/checkout@v4

      - name: Node.js beállítása
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Kutatási összefoglaló generálása
        run: node scripts/build-research-summary.js

      - name: Eredmények commitolása
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Frissített Kőszeg kutatási összefoglaló"
          file_pattern: data/research/koszeg-research-summary.json
