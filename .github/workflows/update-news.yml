```yaml
name: Update news database

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate news and milestone events JSON
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          python3 <<'PY'
          import os
          import re
          import json
          import html
          import urllib.parse
          import urllib.request
          import urllib.error
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime

          os.makedirs("data", exist_ok=True)

          QUERY = '''
          ("Kőszeg" OR "Koszeg" OR "Bozsok" OR "Szombathely" OR "Pilgersdorf" OR "Burgenland")
          (azbeszt OR aszbeszt OR kőzúzalék OR Asbest OR Steinbruch OR Schotter OR Greenpeace)
          '''

          RSS_SOURCES = [
              {"name": "Telex", "url": "https://telex.hu/rss", "type": "media"},
              {"name": "HVG", "url": "https://hvg.hu/rss", "type": "media"},
              {"name": "444", "url": "https://444.hu/feed", "type": "media"},
              {"name": "24.hu", "url": "https://24.hu/feed/", "type": "media"},
              {"name": "Euronews HU", "url": "https://hu.euronews.com/rss", "type": "media"},
              {"name": "Der Standard", "url": "https://www.derstandard.at/rss", "type": "austrian"}
          ]

          HTML_SOURCES = [
              {"name": "Kőszeg Önkormányzat", "url": "https://koszeg.hu/hu/aktualis/hirek", "type": "official"},
              {"name": "Vas Vármegyei Kormányhivatal", "url": "https://kormanyhivatalok.hu/kormanyhivatalok/vas/megye/hirek", "type": "official"},
              {"name": "VAOL", "url": "https://www.vaol.hu/", "type": "media"},
              {"name": "Greenpeace Magyarország", "url": "https://www.greenpeace.org/hungary/", "type": "civil"},
              {"name": "Greenpeace Austria", "url": "https://greenpeace.at/presse/", "type": "civil"},
              {"name": "ORF Burgenland", "url": "https://burgenland.orf.at/", "type": "austrian"},
              {"name": "Kurier Burgenland", "url": "https://kurier.at/chronik/burgenland", "type": "austrian"},
              {"name": "MeinBezirk Burgenland", "url": "https://www.meinbezirk.at/burgenland", "type": "austrian"}
          ]

          NYUGAT_URLS = [
              "https://www.nyugat.hu/",
              "https://www.nyugat.hu/rovat/hirek"
          ]

          MANUAL_NEWS = [
              {
                  "title": "Kőszeg Önkormányzat – Lakossági tájékoztató az ausztriai bányákból származó kőzúzalék ügyében",
                  "source": "Kőszeg Önkormányzat",
                  "source_type": "official",
                  "date": "2026-04",
                  "url": "https://koszeg.hu/hu/aktualis/hirek/",
                  "type": "manual"
              },
              {
                  "title": "Greenpeace Magyarország – Feljelentés az osztrák kőbányákkal kapcsolatban",
                  "source": "Greenpeace",
                  "source_type": "civil",
                  "date": "2026-04",
                  "url": "https://www.greenpeace.org/hungary/",
                  "type": "manual"
              }
          ]

          BLOCKLIST = [
              "spenden",
              "petition",
              "newsletter",
              "jobs",
              "shop",
              "donate",
              "membership",
              "volunteer",
              "advert",
              "reklam"
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def get_text(url, timeout=30):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "koszeg-azbeszt-monitor/1.0"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  raw = response.read()
                  charset = response.headers.get_content_charset() or "utf-8"
                  return raw.decode(charset, errors="replace")

          def clean_text(value):
              if not value:
                  return ""

              value = re.sub(r"<script[\s\S]*?</script>", " ", value, flags=re.I)
              value = re.sub(r"<style[\s\S]*?</style>", " ", value, flags=re.I)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              value = re.sub(r"\s+", " ", value)

              return value.strip()

          def parse_date(value):
              if not value:
                  return ""

              try:
                  return parsedate_to_datetime(value).date().isoformat()
              except:
                  return ""

          def is_blocked(title, url=""):
              text = f"{title} {url}".lower()
              return any(term in text for term in BLOCKLIST)

          def relevant(title, url=""):
              text = f"{title} {url}".lower()

              if is_blocked(title, url):
                  return False

              local_terms = [
                  "kőszeg",
                  "koszeg",
                  "bozsok",
                  "szombathely",
                  "burgenland",
                  "pilgersdorf"
              ]

              issue_terms = [
                  "azbeszt",
                  "aszbeszt",
                  "asbest",
                  "kőzúzalék",
                  "steinbruch",
                  "schotter",
                  "greenpeace",
                  "szennyez"
              ]

              has_local = any(term in text for term in local_terms)
              has_issue = any(term in text for term in issue_terms)

              return has_local and has_issue

          def fetch_rss_source(source):
              items = []

              try:
                  xml_text = get_text(source["url"], timeout=25)
                  root = ET.fromstring(xml_text)

                  channel_items = root.findall(".//item")

                  for item in channel_items[:50]:
                      title = ""
                      link = ""
                      date = ""

                      title_node = item.find("title")
                      if title_node is not None:
                          title = clean_text(title_node.text)

                      link_node = item.find("link")
                      if link_node is not None:
                          link = link_node.text or ""

                      date_node = item.find("pubDate")
                      if date_node is not None:
                          date = parse_date(date_node.text)

                      if title and link and relevant(title, link):
                          items.append({
                              "title": title,
                              "source": source["name"],
                              "source_type": source["type"],
                              "date": date,
                              "url": link,
                              "type": "rss"
                          })

              except Exception as exc:
                  print(f"RSS error for {source['name']}:", str(exc))

              return items

          def extract_links(page, base_url):
              links = []

              for href, title_html in re.findall(
                  r"<a[^>]+href=[\"']([^\"']+)[\"'][^>]*>(.*?)</a>",
                  page,
                  flags=re.I | re.S
              ):
                  title = clean_text(title_html)

                  if not title or len(title) < 6:
                      continue

                  if href.startswith("/"):
                      parsed = urllib.parse.urlparse(base_url)
                      href = f"{parsed.scheme}://{parsed.netloc}{href}"
                  elif not href.startswith("http"):
                      href = urllib.parse.urljoin(base_url, href)

                  links.append((title, href))

              return links

          def fetch_html_source(source):
              items = []

              try:
                  page = get_text(source["url"], timeout=25)

                  for title, href in extract_links(page, source["url"])[:300]:
                      if relevant(title, href):
                          items.append({
                              "title": title,
                              "source": source["name"],
                              "source_type": source["type"],
                              "date": "",
                              "url": href,
                              "type": "html"
                          })

              except Exception as exc:
                  print(f"HTML source error for {source['name']}:", str(exc))

              return items

          def fetch_nyugat_targeted():
              items = []
              seen = set()

              for url in NYUGAT_URLS:
                  try:
                      page = get_text(url, timeout=25)

                      for title, href in extract_links(page, url):
                          if "nyugat.hu" not in href:
                              continue

                          if "/cikk/" not in href:
                              continue

                          if not relevant(title, href):
                              continue

                          if href in seen:
                              continue

                          seen.add(href)

                          items.append({
                              "title": title,
                              "source": "Nyugat.hu",
                              "source_type": "media",
                              "date": "",
                              "url": href,
                              "type": "html_targeted"
                          })

                  except Exception as exc:
                      print("Nyugat targeted error:", str(exc))

              print("Nyugat targeted items:", len(items))
              return items

          def deduplicate(items):
              seen_urls = set()
              seen_titles = set()
              clean = []

              for item in items:
                  url = item.get("url", "").strip()
                  title = clean_text(item.get("title", ""))

                  if not url or not title:
                      continue

                  title_key = re.sub(r"\W+", "", title.lower())[:100]

                  if url in seen_urls or title_key in seen_titles:
                      continue

                  seen_urls.add(url)
                  seen_titles.add(title_key)

                  clean.append(item)

              return clean

          def priority(item):
              score = 0

              source_type = item.get("source_type", "")
              title = item.get("title", "").lower()

              if source_type == "official":
                  score += 120
              elif source_type == "civil":
                  score += 100
              elif source_type == "austrian":
                  score += 90
              elif source_type == "media":
                  score += 70

              if "nyugat" in title:
                  score += 30

              if "kőszeg" in title or "koszeg" in title:
                  score += 40

              return score

          def ai_summary(articles):
              api_key = os.getenv("OPENAI_API_KEY")

              if not api_key:
                  return "AI-összefoglaló nincs bekapcsolva."

              compact = [
                  {
                      "title": a.get("title"),
                      "source": a.get("source"),
                      "source_type": a.get("source_type")
                  }
                  for a in articles[:15]
              ]

              body = {
                  "model": "gpt-4.1-mini",
                  "input": [
                      {
                          "role": "system",
                          "content": "Tárgyilagos magyar sajtófigyelő asszisztens vagy."
                      },
                      {
                          "role": "user",
                          "content":
                              "Készíts rövid magyar összefoglalót ezekről a hírekről:\\n\\n"
                              + json.dumps(compact, ensure_ascii=False)
                      }
                  ]
              }

              try:
                  req = urllib.request.Request(
                      "https://api.openai.com/v1/responses",
                      data=json.dumps(body).encode("utf-8"),
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json"
                      },
                      method="POST"
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      data = json.loads(response.read().decode("utf-8"))

                  return data.get("output_text", "AI-összefoglaló nem készült.")

              except Exception as exc:
                  print("OpenAI error:", str(exc))
                  return "AI-összefoglaló hiba miatt nem készült."

          def milestone_events(articles):
              events = []

              media_count = sum(
                  1 for item in articles
                  if item.get("source_type") == "media"
              )

              official_count = sum(
                  1 for item in articles
                  if item.get("source_type") == "official"
              )

              austrian_count = sum(
                  1 for item in articles
                  if item.get("source_type") == "austrian"
              )

              civil_count = sum(
                  1 for item in articles
                  if item.get("source_type") == "civil"
              )

              events.append({
                  "date": "Folyamatos",
                  "title": f"{media_count} médiatalálat szerepel a monitoring rendszerben.",
                  "source": "Magyar médiafigyelés",
                  "type": "media_wave",
                  "url": ""
              })

              events.append({
                  "date": "Folyamatos",
                  "title": f"{official_count} hivatalos, {civil_count} civil és {austrian_count} osztrák/burgenlandi forrás szerepel a rendszerben.",
                  "source": "Automatikus monitoring",
                  "type": "system_summary",
                  "url": ""
              })

              return events

          collected = []

          for source in RSS_SOURCES:
              collected.extend(fetch_rss_source(source))

          for source in HTML_SOURCES:
              collected.extend(fetch_html_source(source))

          collected.extend(fetch_nyugat_targeted())

          all_news = deduplicate(collected + MANUAL_NEWS)
          all_news = sorted(all_news, key=priority, reverse=True)

          source_counts = {}
          source_type_counts = {}

          for item in all_news:
              source = item.get("source", "unknown")
              source_type = item.get("source_type", "unknown")

              source_counts[source] = source_counts.get(source, 0) + 1
              source_type_counts[source_type] = source_type_counts.get(source_type, 0) + 1

          summary = ai_summary(all_news)
          events = milestone_events(all_news)

          news_output = {
              "generated_at": now_iso(),
              "refresh_hours": 6,
              "query": QUERY,
              "mode": "stable_monitoring",
              "source_counts": source_counts,
              "source_type_counts": source_type_counts,
              "summary": summary,
              "articles": all_news[:45]
          }

          events_output = {
              "generated_at": now_iso(),
              "mode": "milestone_summary",
              "events": events
          }

          with open("data/news.json", "w", encoding="utf-8") as f:
              json.dump(news_output, f, ensure_ascii=False, indent=2)

          with open("data/events.json", "w", encoding="utf-8") as f:
              json.dump(events_output, f, ensure_ascii=False, indent=2)

          print("Generated data/news.json")
          print("Generated data/events.json")
          print("Articles:", len(news_output["articles"]))
          print("Events:", len(events_output["events"]))
          print("Source types:", source_type_counts)
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/news.json data/events.json

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update monitoring database"
            git push
          fi
```
