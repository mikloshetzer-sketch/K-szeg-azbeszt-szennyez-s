name: Update news database

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate news JSON
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.2
        run: |
          python3 <<'PY'
          import os
          import json
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          os.makedirs("data", exist_ok=True)

          QUERY = '("Kőszeg" OR "Koszeg" OR "Bozsok" OR "Szombathely") (azbeszt OR aszbeszt OR azbesztszennyezés OR kőzúzalék)'

          MANUAL_NEWS = [
              {
                  "title": "Telex – Azbesztügy Kőszegen: intézkedések és érintett területek",
                  "source": "Telex",
                  "date": "2026-04-24",
                  "url": "https://telex.hu/belfold/2026/04/24/azbeszt-koszeg-banya-intezkedesek"
              },
              {
                  "title": "HVG – Kőszegre is kerülhetett az azbeszttartalmú kőzúzalékból",
                  "source": "HVG",
                  "date": "2026-04-24",
                  "url": "https://hvg.hu/zhvg/20260424_koszeg-azbeszt-tartalom-kozuzalek-bozsok-szombathely"
              },
              {
                  "title": "444 – Szombathely és Bozsok mellett Kőszeg is érintett lehet",
                  "source": "444",
                  "date": "2026-04-24",
                  "url": "https://444.hu/2026/04/24/szombathely-es-bozsok-mellett-koszegre-is-juthatott-abbol-az-azbeszttel-szennyezett-kozuzalekbol"
              },
              {
                  "title": "VAOL – Helyi tudósítás az azbesztügyről",
                  "source": "VAOL",
                  "date": "2026-04",
                  "url": "https://www.vaol.hu/helyi-kozelet/2026/04/azbeszt-ugy-bozsok-koszeg"
              }
          ]

          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "koszeg-azbeszt-monitor/1.0"})
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def fetch_gdelt():
              encoded = urllib.parse.quote(QUERY)
              url = (
                  "https://api.gdeltproject.org/api/v2/doc/doc?"
                  f"query={encoded}&mode=ArtList&format=json&maxrecords=20&sort=HybridRel"
              )

              try:
                  data = get_json(url)
                  articles = []

                  for item in data.get("articles", []):
                      title = item.get("title")
                      link = item.get("url")
                      if not title or not link:
                          continue

                      date_raw = item.get("seendate", "")
                      date = ""
                      if len(date_raw) >= 8:
                          date = f"{date_raw[0:4]}-{date_raw[4:6]}-{date_raw[6:8]}"

                      articles.append({
                          "title": title,
                          "source": item.get("domain") or item.get("sourceCountry") or "GDELT",
                          "date": date,
                          "url": link,
                          "type": "automatic"
                      })

                  return articles

              except Exception as exc:
                  print("GDELT error:", exc)
                  return []

          def deduplicate(items):
              seen = set()
              clean = []

              for item in items:
                  key = item.get("url")
                  if not key or key in seen:
                      continue
                  seen.add(key)
                  clean.append(item)

              return clean

          def ai_summary(articles):
              api_key = os.getenv("OPENAI_API_KEY")
              model = os.getenv("OPENAI_MODEL", "gpt-5.2")

              if not api_key:
                  return "AI-összefoglaló nincs bekapcsolva. Állíts be OPENAI_API_KEY GitHub Secretet."

              compact = [
                  {
                      "title": a.get("title"),
                      "source": a.get("source"),
                      "date": a.get("date"),
                      "url": a.get("url")
                  }
                  for a in articles[:10]
              ]

              prompt = (
                  "Készíts magyar nyelvű, tárgyilagos, 4-5 mondatos sajtóösszefoglalót "
                  "a Kőszeg és környéke azbeszt/kőzúzalék ügyéről. "
                  "Ne állíts többet, mint amit a címek és források alapján biztosan lehet. "
                  "A végén adj 3 rövid bulletpontot: mi történt, kik érintettek, mire figyeljen a lakosság.\n\n"
                  + json.dumps(compact, ensure_ascii=False)
              )

              body = {
                  "model": model,
                  "input": prompt
              }

              try:
                  req = urllib.request.Request(
                      "https://api.openai.com/v1/responses",
                      data=json.dumps(body).encode("utf-8"),
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json"
                      },
                      method="POST"
                  )

                  with urllib.request.urlopen(req, timeout=60) as response:
                      data = json.loads(response.read().decode("utf-8"))

                  return data.get("output_text", "").strip() or "AI-összefoglaló nem készült."

              except Exception as exc:
                  print("OpenAI summary error:", exc)
                  return "AI-összefoglaló hiba miatt nem készült el."

          automatic = fetch_gdelt()

          if automatic:
              all_news = deduplicate(automatic + MANUAL_NEWS)
              mode = "automatic"
          else:
              all_news = MANUAL_NEWS
              mode = "manual_fallback"

          output = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "refresh_hours": 6,
              "query": QUERY,
              "mode": mode,
              "summary": ai_summary(all_news),
              "articles": all_news[:20]
          }

          with open("data/news.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print("Generated data/news.json with", len(output["articles"]), "articles")
          PY

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/news.json

          if git diff --cached --quiet; then
            echo "No news changes."
          else
            git commit -m "Update news database"
            git push
          fi
