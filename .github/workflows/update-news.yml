name: Update news database

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate news and reports
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: |
          python3 <<'PY'
          import os, re, json, html, urllib.parse, urllib.request, urllib.error
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime

          os.makedirs("data", exist_ok=True)

          QUERY = '''
          ("Kőszeg" OR "Koszeg" OR "Bozsok" OR "Szombathely" OR "Pilgersdorf" OR "Burgenland" OR "Bernstein")
          (azbeszt OR aszbeszt OR kőzúzalék OR kőbánya OR serpentinit OR Asbest OR Steinbruch OR Schotter OR Greenpeace)
          '''

          RSS_SOURCES = [
              {"name": "Telex", "url": "https://telex.hu/rss", "type": "media"},
              {"name": "HVG", "url": "https://hvg.hu/rss", "type": "media"},
              {"name": "444", "url": "https://444.hu/feed", "type": "media"},
              {"name": "24.hu", "url": "https://24.hu/feed/", "type": "media"},
              {"name": "Portfolio", "url": "https://www.portfolio.hu/rss", "type": "media"},
              {"name": "Portfolio gazdaság", "url": "https://www.portfolio.hu/rss/gazdasag.xml", "type": "media"},
              {"name": "Euronews HU", "url": "https://hu.euronews.com/rss", "type": "media"},
              {"name": "Der Standard", "url": "https://www.derstandard.at/rss", "type": "austrian"}
          ]

          HTML_SOURCES = [
              {"name": "Kőszeg Önkormányzat", "url": "https://koszeg.hu/hu/aktualis/hirek", "type": "official"},
              {"name": "Vas Vármegyei Kormányhivatal", "url": "https://kormanyhivatalok.hu/kormanyhivatalok/vas/megye/hirek", "type": "official"},
              {"name": "VAOL", "url": "https://www.vaol.hu/", "type": "media"},
              {"name": "Greenpeace Magyarország", "url": "https://www.greenpeace.org/hungary/", "type": "civil"},
              {"name": "Greenpeace Austria", "url": "https://greenpeace.at/presse/", "type": "civil"},
              {"name": "ORF Burgenland", "url": "https://burgenland.orf.at/", "type": "austrian"},
              {"name": "Kurier Burgenland", "url": "https://kurier.at/chronik/burgenland", "type": "austrian"},
              {"name": "MeinBezirk Burgenland", "url": "https://www.meinbezirk.at/burgenland", "type": "austrian"}
          ]

          TARGETED_HUNGARIAN_MEDIA = [
              {
                  "name": "Telex",
                  "domain": "telex.hu",
                  "urls": [
                      "https://telex.hu/",
                      "https://telex.hu/belfold",
                      "https://telex.hu/cimke/koszeg",
                      "https://telex.hu/cimke/azbeszt"
                  ]
              },
              {
                  "name": "HVG",
                  "domain": "hvg.hu",
                  "urls": [
                      "https://hvg.hu/",
                      "https://hvg.hu/itthon",
                      "https://hvg.hu/cimke/K%C5%91szeg",
                      "https://hvg.hu/cimke/azbeszt"
                  ]
              },
              {
                  "name": "444",
                  "domain": "444.hu",
                  "urls": [
                      "https://444.hu/",
                      "https://444.hu/belfold",
                      "https://444.hu/tag/koszeg",
                      "https://444.hu/tag/azbeszt"
                  ]
              },
              {
                  "name": "Portfolio",
                  "domain": "portfolio.hu",
                  "urls": [
                      "https://www.portfolio.hu/",
                      "https://www.portfolio.hu/gazdasag",
                      "https://www.portfolio.hu/cimke/k%C5%91szeg",
                      "https://www.portfolio.hu/cimke/azbeszt"
                  ]
              },
              {
                  "name": "24.hu",
                  "domain": "24.hu",
                  "urls": [
                      "https://24.hu/",
                      "https://24.hu/belfold/",
                      "https://24.hu/tag/koszeg/",
                      "https://24.hu/tag/azbeszt/"
                  ]
              },
              {
                  "name": "VAOL",
                  "domain": "vaol.hu",
                  "urls": [
                      "https://www.vaol.hu/",
                      "https://www.vaol.hu/helyi-kozelet/",
                      "https://www.vaol.hu/cimke/koszeg",
                      "https://www.vaol.hu/cimke/azbeszt"
                  ]
              }
          ]

          NYUGAT_URLS = [
              "https://www.nyugat.hu/",
              "https://www.nyugat.hu/rovat/hirek"
          ]

          MANUAL_NEWS = [
              {
                  "title": "Kőszeg Önkormányzat – Lakossági tájékoztató az ausztriai bányákból származó kőzúzalék ügyében",
                  "source": "Kőszeg Önkormányzat",
                  "source_type": "official",
                  "date": "2026-04",
                  "url": "https://koszeg.hu/hu/aktualis/hirek/",
                  "type": "manual"
              },
              {
                  "title": "Greenpeace Magyarország – Feljelentés az osztrák kőbányákkal kapcsolatban",
                  "source": "Greenpeace",
                  "source_type": "civil",
                  "date": "2026-04",
                  "url": "https://www.greenpeace.org/hungary/",
                  "type": "manual"
              }
          ]

          BLOCKLIST = [
              "spenden", "spendenabsetzbarkeit", "grossspenden", "großspenden",
              "mitmachen", "petition", "petitionen", "umfragen", "ehrenamt",
              "newsletter", "jobs", "karriere", "shop", "donate", "membership",
              "volunteer", "advert", "reklam", "impressum", "adatvedelem",
              "privacy", "cookie", "login", "belepes", "belépés", "előfizetés",
              "elofizetes"
          ]

          GREENPEACE_HARD_BLOCKLIST = [
              "spenden", "donate", "adomany", "adomány", "tamogatas", "támogatás",
              "petition", "peticio", "petíció", "newsletter", "hirlevel", "hírlevél",
              "jobs", "karriere", "campaign", "kampany", "kampány", "mitmachen",
              "volunteer", "onkentes", "önkéntes", "shop", "impressum", "privacy",
              "adatvedelem", "cookie", "csapathír", "csapatunk", "természet & környezet",
              "ember & társadalom", "személyes", "hírek és média"
          ]

          LOCAL_TERMS = [
              "kőszeg", "koszeg", "bozsok", "szombathely", "vas",
              "pilgersdorf", "burgenland", "bernstein", "borostyánkő"
          ]

          ISSUE_TERMS = [
              "azbeszt", "aszbeszt", "asbest", "asbestbelastung",
              "asbestverschmutzung", "kőzúzalék", "kozuzalek", "kőbánya",
              "kobanya", "steinbruch", "schotter", "gestein", "verunreinigung",
              "serpentinit", "bernsztein", "bernstein", "szennyez",
              "maszk", "közterület", "kozterulet"
          ]

          GREENPEACE_LOCAL_TERMS = [
              "kőszeg", "koszeg", "bozsok", "szombathely",
              "pilgersdorf", "burgenland", "bernstein", "borostyánkő"
          ]

          GREENPEACE_ISSUE_TERMS = [
              "azbeszt", "aszbeszt", "asbest",
              "kőzúzalék", "kozuzalek",
              "kőbánya", "kobanya",
              "steinbruch", "schotter",
              "serpentinit"
          ]

          HUNGARIAN_MEDIA_DOMAINS = {
              "telex.hu": "Telex",
              "hvg.hu": "HVG",
              "444.hu": "444",
              "portfolio.hu": "Portfolio",
              "24.hu": "24.hu",
              "vaol.hu": "VAOL",
              "nyugat.hu": "Nyugat.hu",
              "hu.euronews.com": "Euronews HU"
          }

          ARTICLE_DATE_CACHE = {}

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def today_iso_date():
              return datetime.now(timezone.utc).date().isoformat()

          def get_text(url, timeout=30):
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 (compatible; koszeg-azbeszt-monitor/1.0; +https://github.com/)",
                      "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,application/rss+xml;q=0.9,*/*;q=0.8"
                  }
              )
              with urllib.request.urlopen(req, timeout=timeout) as response:
                  raw = response.read()
                  charset = response.headers.get_content_charset() or "utf-8"
                  return raw.decode(charset, errors="replace")

          def get_json(url):
              return json.loads(get_text(url))

          def clean_text(value):
              if not value:
                  return ""
              value = re.sub(r"<script[\s\S]*?</script>", " ", value, flags=re.I)
              value = re.sub(r"<style[\s\S]*?</style>", " ", value, flags=re.I)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              value = re.sub(r"\s+", " ", value)
              return value.strip()

          def parse_date(value):
              if not value:
                  return ""
              try:
                  return parsedate_to_datetime(value).date().isoformat()
              except Exception:
                  pass

              value = clean_text(value)

              match = re.search(r"(20\d{2})[-./](\d{1,2})[-./](\d{1,2})", value)
              if match:
                  return f"{match.group(1)}-{int(match.group(2)):02d}-{int(match.group(3)):02d}"

              match = re.search(r"(20\d{2})\s*[.]\s*(január|február|március|április|május|június|július|augusztus|szeptember|október|november|december)\s+(\d{1,2})", value, flags=re.I)
              if match:
                  months = {
                      "január": 1, "február": 2, "március": 3, "április": 4,
                      "május": 5, "június": 6, "július": 7, "augusztus": 8,
                      "szeptember": 9, "október": 10, "november": 11, "december": 12
                  }
                  month = months.get(match.group(2).lower())
                  if month:
                      return f"{match.group(1)}-{month:02d}-{int(match.group(3)):02d}"

              return ""

          def extract_article_date_from_html(page):
              if not page:
                  return ""

              patterns = [
                  r'<meta[^>]+property=["\']article:published_time["\'][^>]+content=["\']([^"\']+)["\']',
                  r'<meta[^>]+content=["\']([^"\']+)["\'][^>]+property=["\']article:published_time["\']',
                  r'<meta[^>]+name=["\']pubdate["\'][^>]+content=["\']([^"\']+)["\']',
                  r'<meta[^>]+name=["\']date["\'][^>]+content=["\']([^"\']+)["\']',
                  r'<meta[^>]+itemprop=["\']datePublished["\'][^>]+content=["\']([^"\']+)["\']',
                  r'<time[^>]+datetime=["\']([^"\']+)["\']',
                  r'"datePublished"\s*:\s*"([^"]+)"',
                  r'"dateCreated"\s*:\s*"([^"]+)"',
                  r'"uploadDate"\s*:\s*"([^"]+)"'
              ]

              for pattern in patterns:
                  match = re.search(pattern, page, flags=re.I | re.S)
                  if match:
                      parsed = parse_date(match.group(1))
                      if parsed:
                          return parsed

              text = clean_text(page[:50000])
              parsed = parse_date(text)
              if parsed:
                  return parsed

              return ""

          def date_from_url(url):
              text = url or ""
              match = re.search(r"/(20\d{2})/(\d{1,2})/(\d{1,2})(?:/|$)", text)
              if match:
                  return f"{match.group(1)}-{int(match.group(2)):02d}-{int(match.group(3)):02d}"
              return ""

          def fetch_article_date(url):
              key = normalized_url(url)
              if key in ARTICLE_DATE_CACHE:
                  return ARTICLE_DATE_CACHE[key]

              from_url = date_from_url(url)
              if from_url:
                  ARTICLE_DATE_CACHE[key] = from_url
                  return from_url

              try:
                  page = get_text(url, timeout=15)
                  parsed = extract_article_date_from_html(page)
                  ARTICLE_DATE_CACHE[key] = parsed
                  return parsed
              except Exception as exc:
                  print("Article date fetch error:", url, str(exc))
                  ARTICLE_DATE_CACHE[key] = ""
                  return ""

          def normalized_url(url):
              url = (url or "").strip()
              try:
                  parsed = urllib.parse.urlparse(url)
                  query = urllib.parse.parse_qsl(parsed.query, keep_blank_values=True)
                  filtered = [
                      (k, v) for k, v in query
                      if not k.lower().startswith("utm_") and k.lower() not in ("fbclid", "gclid")
                  ]
                  new_query = urllib.parse.urlencode(filtered)
                  return urllib.parse.urlunparse(
                      (parsed.scheme, parsed.netloc.lower(), parsed.path.rstrip("/"), "", new_query, "")
                  )
              except Exception:
                  return url

          def domain_of(url):
              try:
                  return urllib.parse.urlparse(url).netloc.lower().replace("www.", "")
              except Exception:
                  return ""

          def is_greenpeace_url(url):
              domain = domain_of(url)
              return "greenpeace.org" in domain or "greenpeace.at" in domain

          def classify_source_name(url, fallback="GDELT"):
              domain = domain_of(url)

              for media_domain, media_name in HUNGARIAN_MEDIA_DOMAINS.items():
                  if domain == media_domain or domain.endswith("." + media_domain):
                      return media_name

              if "greenpeace.org" in domain:
                  return "Greenpeace Magyarország"

              if "greenpeace.at" in domain:
                  return "Greenpeace Austria"

              return fallback

          def classify_gdelt_source_type(link):
              domain = domain_of(link)

              if ".at" in link or "orf.at" in link:
                  return "austrian"

              for media_domain in HUNGARIAN_MEDIA_DOMAINS:
                  if domain == media_domain or domain.endswith("." + media_domain):
                      return "media"

              if domain.endswith(".hu"):
                  return "media"

              return "gdelt"

          def is_blocked(title, url=""):
              text = f"{title} {url}".lower()
              return any(term in text for term in BLOCKLIST)

          def is_greenpeace_blocked(title, url=""):
              text = f"{title} {url}".lower()
              return any(term in text for term in GREENPEACE_HARD_BLOCKLIST)

          def has_local_and_issue(text):
              text = (text or "").lower()
              has_local = any(term in text for term in LOCAL_TERMS)
              has_issue = any(term in text for term in ISSUE_TERMS)
              return has_local and has_issue

          def greenpeace_relevant(title, url):
              text = f"{title} {url}".lower()

              if is_greenpeace_blocked(title, url):
                  return False

              has_local = any(term in text for term in GREENPEACE_LOCAL_TERMS)
              has_issue = any(term in text for term in GREENPEACE_ISSUE_TERMS)

              return has_local and has_issue

          def relevant(title, url=""):
              text = f"{title} {url}".lower()

              if is_blocked(title, url):
                  return False
              if "nyugat.hu" in url.lower():
                  nyugat_terms = [
                      "azbeszt",
                      "aszbeszt",
                      "azbesztveszély",
                      "kőzúzalék",
                      "kőbánya",
                      "szennyez",
                      "maszk",
                      "lezárt",
                      "bezárt",
                      "óvintézkedés",
                      "újranyitnák",
                      "burgenlandi",
                      "bányákat"
                  ]

                  if any(term in text for term in nyugat_terms):
                      return True

              if is_greenpeace_url(url):
                  return greenpeace_relevant(title, url)

              if has_local_and_issue(text):
                  return True

              return False

          def fetch_rss_source(source):
              items = []
              try:
                  xml_text = get_text(source["url"], timeout=25)
                  root = ET.fromstring(xml_text)

                  channel_items = root.findall(".//item")
                  if not channel_items:
                      channel_items = root.findall(".//{http://www.w3.org/2005/Atom}entry")

                  for item in channel_items[:150]:
                      title = ""
                      link = ""
                      date = ""

                      title_node = item.find("title")
                      if title_node is None:
                          title_node = item.find("{http://www.w3.org/2005/Atom}title")
                      if title_node is not None:
                          title = clean_text(title_node.text)

                      link_node = item.find("link")
                      if link_node is not None:
                          link = link_node.text or link_node.attrib.get("href", "")
                      else:
                          atom_link = item.find("{http://www.w3.org/2005/Atom}link")
                          if atom_link is not None:
                              link = atom_link.attrib.get("href", "")

                      date_node = item.find("pubDate")
                      if date_node is None:
                          date_node = item.find("{http://www.w3.org/2005/Atom}updated")
                      if date_node is None:
                          date_node = item.find("{http://www.w3.org/2005/Atom}published")
                      if date_node is not None:
                          date = parse_date(date_node.text)

                      if title and link and relevant(title, link):
                          if not date:
                              date = fetch_article_date(link)
                          items.append({
                              "title": title,
                              "source": source["name"],
                              "source_type": source["type"],
                              "date": date,
                              "url": link,
                              "type": "rss"
                          })

              except Exception as exc:
                  print(f"RSS error for {source['name']}:", str(exc))

              return items

          def extract_links_from_html(page, base_url):
              links = []
              for href, title_html in re.findall(
                  r"<a[^>]+href=[\"']([^\"']+)[\"'][^>]*>(.*?)</a>",
                  page,
                  flags=re.I | re.S
              ):
                  title = clean_text(title_html)
                  if not title or len(title) < 6:
                      continue

                  if href.startswith("/"):
                      parsed = urllib.parse.urlparse(base_url)
                      href = f"{parsed.scheme}://{parsed.netloc}{href}"
                  elif not href.startswith("http"):
                      href = urllib.parse.urljoin(base_url, href)

                  links.append((title, href))

              return links

          def fetch_html_source(source):
              items = []
              try:
                  page = get_text(source["url"], timeout=25)
                  for title, href in extract_links_from_html(page, source["url"])[:500]:
                      if relevant(title, href):
                          date = fetch_article_date(href)
                          items.append({
                              "title": title,
                              "source": source["name"],
                              "source_type": source["type"],
                              "date": date,
                              "url": href,
                              "type": "html"
                          })

              except Exception as exc:
                  print(f"HTML source error for {source['name']}:", str(exc))

              return items

          def fetch_nyugat_targeted():
              items = []
              seen = set()

              for url in NYUGAT_URLS:
                  try:
                      page = get_text(url, timeout=25)
                      candidates = extract_links_from_html(page, url)

                      for title, href in candidates[:800]:
                          parsed = urllib.parse.urlparse(href)

                          if "nyugat.hu" not in parsed.netloc:
                              continue

                          if "/cikk/" not in parsed.path:
                              continue

                          if not relevant(title, href):
                              continue

                          key = normalized_url(href)
                          if key in seen:
                              continue

                          seen.add(key)
                          date = fetch_article_date(href)

                          items.append({
                              "title": title,
                              "source": "Nyugat.hu",
                              "source_type": "media",
                              "date": date,
                              "url": href,
                              "type": "html_targeted"
                          })

                  except Exception as exc:
                      print("Nyugat targeted error:", url, str(exc))

              print("Nyugat targeted items:", len(items))
              return items

          def fetch_targeted_hungarian_media():
              items = []
              seen = set()

              for source in TARGETED_HUNGARIAN_MEDIA:
                  source_name = source["name"]
                  domain = source["domain"]

                  for url in source["urls"]:
                      try:
                          page = get_text(url, timeout=25)
                          candidates = extract_links_from_html(page, url)

                          for title, href in candidates[:700]:
                              parsed = urllib.parse.urlparse(href)
                              netloc = parsed.netloc.lower().replace("www.", "")

                              if domain not in netloc:
                                  continue

                              if parsed.path in ("", "/"):
                                  continue

                              if any(part in parsed.path.lower() for part in ["/tag/", "/cimke/"]):
                                  path_parts = parsed.path.strip("/").split("/")
                                  if len(path_parts) <= 2:
                                      continue

                              if not relevant(title, href):
                                  continue

                              key = normalized_url(href)
                              if key in seen:
                                  continue

                              seen.add(key)
                              date = fetch_article_date(href)

                              items.append({
                                  "title": title,
                                  "source": source_name,
                                  "source_type": "media",
                                  "date": date,
                                  "url": href,
                                  "type": "html_targeted"
                              })

                      except Exception as exc:
                          print(f"Targeted Hungarian media error for {source_name} / {url}:", str(exc))

              print("Targeted Hungarian media items:", len(items))
              return items

          def fetch_gdelt():
              encoded = urllib.parse.quote(QUERY)
              url = (
                  "https://api.gdeltproject.org/api/v2/doc/doc?"
                  f"query={encoded}&mode=ArtList&format=json&maxrecords=80&sort=HybridRel"
              )

              try:
                  data = get_json(url)
                  articles = []

                  for item in data.get("articles", []):
                      title = item.get("title")
                      link = item.get("url")

                      if not title or not link:
                          continue

                      if not relevant(title, link):
                          continue

                      date_raw = item.get("seendate", "")
                      date = ""

                      if len(date_raw) >= 8:
                          date = f"{date_raw[0:4]}-{date_raw[4:6]}-{date_raw[6:8]}"

                      if not date:
                          date = fetch_article_date(link)

                      source_type = classify_gdelt_source_type(link)
                      source_name = classify_source_name(link, item.get("domain") or "GDELT")

                      articles.append({
                          "title": title,
                          "source": source_name,
                          "source_type": source_type,
                          "date": date,
                          "url": link,
                          "type": "gdelt"
                      })

                  return articles

              except Exception as exc:
                  print("GDELT error:", str(exc))
                  return []

          def deduplicate(items):
              seen_urls = set()
              seen_titles = set()
              clean = []

              for item in items:
                  url = item.get("url", "").strip()
                  title = clean_text(item.get("title", ""))

                  if not url or not title:
                      continue

                  if is_blocked(title, url):
                      continue

                  if is_greenpeace_url(url) and not greenpeace_relevant(title, url):
                      continue

                  url_key = normalized_url(url)
                  title_key = re.sub(r"\W+", "", title.lower())[:100]

                  if url_key in seen_urls or title_key in seen_titles:
                      continue

                  seen_urls.add(url_key)
                  seen_titles.add(title_key)

                  item["title"] = title
                  item["url"] = url_key or url
                  clean.append(item)

              return clean

          def priority(item):
              source_type = item.get("source_type", "")
              title = item.get("title", "").lower()
              source = item.get("source", "").lower()
              url = item.get("url", "").lower()

              score = 0

              if source_type == "official":
                  score += 120
              elif source_type == "civil":
                  score += 100
              elif source_type == "austrian":
                  score += 90
              elif source_type == "media":
                  score += 70
              else:
                  score += 40

              if "nyugat" in source or "nyugat.hu" in url:
                  score += 45

              for national in ["telex", "hvg", "444", "portfolio"]:
                  if national in source or national in url:
                      score += 22

              for term in [
                  "kőszeg", "koszeg", "bozsok", "szombathely",
                  "azbeszt", "aszbeszt", "asbest", "greenpeace",
                  "kormányhivatal", "önkormányzat", "pilgersdorf",
                  "burgenland", "steinbruch", "schotter", "maszk"
              ]:
                  if term in title or term in source or term in url:
                      score += 25

              return score

          def sort_date_key(item):
              date = item.get("date", "")
              if re.match(r"^20\d{2}-\d{2}-\d{2}$", date):
                  return date
              if re.match(r"^20\d{2}-\d{2}$", date):
                  return date + "-00"
              return "0000-00-00"

          def extract_openai_text(data):
              text = data.get("output_text", "")
              if isinstance(text, str) and text.strip():
                  return text.strip()

              chunks = []
              for item in data.get("output", []):
                  for content in item.get("content", []):
                      if content.get("type") in ("output_text", "text"):
                          chunks.append(content.get("text", ""))

              return "\n".join(chunks).strip()

          def call_openai(prompt, system_message, max_tokens=1100):
              api_key = os.getenv("OPENAI_API_KEY")
              model = os.getenv("OPENAI_MODEL", "gpt-4.1-mini")

              if not api_key:
                  return "AI-összefoglaló nincs bekapcsolva. A GitHub Secrets között add meg az OPENAI_API_KEY értéket."

              body = {
                  "model": model,
                  "input": [
                      {"role": "system", "content": system_message},
                      {"role": "user", "content": prompt}
                  ],
                  "max_output_tokens": max_tokens
              }

              try:
                  req = urllib.request.Request(
                      "https://api.openai.com/v1/responses",
                      data=json.dumps(body).encode("utf-8"),
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json"
                      },
                      method="POST"
                  )

                  with urllib.request.urlopen(req, timeout=90) as response:
                      data = json.loads(response.read().decode("utf-8"))

                  return extract_openai_text(data) or "AI-összefoglaló nem készült."

              except urllib.error.HTTPError as exc:
                  error_body = exc.read().decode("utf-8", errors="replace")
                  print("OpenAI HTTP error:", exc.code)
                  print(error_body[:3000])
                  return f"AI-összefoglaló hiba miatt nem készült el. OpenAI HTTP hiba: {exc.code}."

              except Exception as exc:
                  print("OpenAI summary error:", str(exc))
                  return "AI-összefoglaló hiba miatt nem készült el."

          def ai_summary(articles):
              compact = [
                  {
                      "title": a.get("title"),
                      "source": a.get("source"),
                      "source_type": a.get("source_type"),
                      "date": a.get("date"),
                      "url": a.get("url")
                  }
                  for a in articles[:18]
              ]

              prompt = (
                  "Írj magyar nyelvű, olvasmányos, tárgyilagos sajtófigyelő összefoglalót "
                  "a Kőszeg, Bozsok, Szombathely, Pilgersdorf és Burgenland térségét érintő "
                  "azbeszt/kőzúzalék ügyről. A szöveg legyen gördülékeny, közérthető és mértéktartó. "
                  "Különbséget kell tenni hivatalos, önkormányzati, kormányhivatali, civil, magyar média "
                  "és osztrák forrás között. Ne legyen pánikkeltő, ne állítson laboreredményt, hatósági döntést "
                  "vagy egészségügyi következtetést, ha az nem következik egyértelműen a megadott forráslistából. "
                  "A végén legyen egy külön 'Röviden:' rész három rövid mondattal.\n\n"
                  + json.dumps(compact, ensure_ascii=False, indent=2)
              )

              system_message = (
                  "Tárgyilagos, jól fogalmazó magyar sajtófigyelő és közéleti elemző vagy. "
                  "Olvasmányos, pontos és mértéktartó helyzetképet írsz. Nem dramatizálsz, "
                  "nem találgatsz, és világosan elkülöníted a hivatalos, civil, média- és osztrák forrásokat."
              )

              return call_openai(prompt, system_message, 1100)

          def ai_austrian_summary(articles):
              austrian_articles = [
                  a for a in articles
                  if a.get("source_type") == "austrian"
                  or ".at" in a.get("url", "")
                  or "ORF" in a.get("source", "")
                  or "Kurier" in a.get("source", "")
                  or "MeinBezirk" in a.get("source", "")
                  or "Der Standard" in a.get("source", "")
              ]

              compact = [
                  {
                      "title": a.get("title"),
                      "source": a.get("source"),
                      "date": a.get("date"),
                      "url": a.get("url")
                  }
                  for a in austrian_articles[:15]
              ]

              if not compact:
                  return {
                      "generated_at": now_iso(),
                      "count": 0,
                      "summary": "Jelenleg nincs külön osztrák vagy burgenlandi hírtalálat a rendszerben.",
                      "articles": []
                  }

              prompt = (
                  "Készíts magyar nyelvű, olvasmányos, külön jelentésként használható összefoglalót "
                  "az osztrák és burgenlandi források alapján. A téma a Kőszeg, Bozsok, Szombathely, "
                  "Pilgersdorf, Bernstein és Burgenland térségét érintő azbeszt/kőzúzalék ügy. "
                  "Ne fordítsd szó szerint a címeket, hanem foglald össze, mit lehet ezekből az osztrák "
                  "forrásokból óvatosan megállapítani. Térj ki arra, hogy milyen szerepe van az osztrák "
                  "forrásoknak, milyen települések vagy térségek jelennek meg, és miért fontos a határon "
                  "átnyúló hírfigyelés. Ne állíts laboreredményt vagy hatósági döntést, ha azt a forráslista "
                  "nem támasztja alá. A végén adj egy 'Figyelendő pontok' című rövid részt 3 ponttal.\n\n"
                  + json.dumps(compact, ensure_ascii=False, indent=2)
              )

              system_message = (
                  "Magyar nyelvű regionális OSINT-elemző vagy. Osztrák és burgenlandi hírforrásokból "
                  "készítesz közérthető, tárgyilagos magyar összefoglalót. Nem dramatizálsz, nem találgatsz, "
                  "és egyértelműen jelzed a bizonytalanságokat."
              )

              summary = call_openai(prompt, system_message, 1200)

              return {
                  "generated_at": now_iso(),
                  "count": len(austrian_articles),
                  "summary": summary,
                  "articles": austrian_articles[:15]
              }

          def html_escape(value):
              return html.escape(str(value or ""), quote=True)

          def build_austrian_html(austrian_summary):
              articles = austrian_summary.get("articles", [])
              html_articles = ""

              for item in articles:
                  source = html_escape(item.get("source", "Osztrák forrás"))
                  title = html_escape(item.get("title", "Cím nélkül"))
                  url = html_escape(item.get("url", "#"))
                  date = html_escape(item.get("date", ""))

                  html_articles += f"""
                  <li>
                    <strong>{source}</strong>:
                    <a href="{url}" target="_blank" rel="noopener">{title}</a>
                    <em>{date}</em>
                  </li>
                  """

              summary_html = html_escape(
                  austrian_summary.get("summary", "Nincs elérhető összefoglaló.")
              ).replace("\n", "<br>")

              return f"""<!DOCTYPE html>
          <html lang="hu">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Osztrák és burgenlandi hírösszefoglaló</title>
            <style>
              body {{
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 34px;
                line-height: 1.6;
                color: #111827;
                background: #f8fafc;
              }}
              .box {{
                background: white;
                border: 1px solid #d0d9e2;
                border-left: 6px solid #2563eb;
                border-radius: 10px;
                padding: 24px;
                max-width: 980px;
                margin: auto;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
              }}
              h1 {{ margin-top: 0; }}
              h2 {{
                margin-top: 28px;
                border-bottom: 1px solid #ddd;
                padding-bottom: 6px;
              }}
              a {{ color: #0645ad; }}
              li {{ margin-bottom: 10px; }}
              .warning {{
                background: #fff7ed;
                border-left: 5px solid #f59e0b;
                padding: 12px;
                margin: 18px 0;
              }}
              .meta {{
                color: #4b5563;
                font-size: 14px;
              }}
              .actions {{
                margin-top: 24px;
              }}
              button {{
                background: #2563eb;
                color: white;
                border: 0;
                border-radius: 8px;
                padding: 10px 14px;
                font-weight: 700;
                cursor: pointer;
              }}
              @media print {{
                .actions {{ display: none; }}
                body {{ background: white; padding: 0; }}
                .box {{ box-shadow: none; border: 0; }}
              }}
            </style>
          </head>
          <body>
            <div class="box">
              <h1>Osztrák és burgenlandi hírösszefoglaló</h1>

              <p class="meta">
                Készült: {html_escape(austrian_summary.get("generated_at", ""))}<br>
                Források száma: {html_escape(austrian_summary.get("count", 0))}
              </p>

              <div class="warning">
                Tájékoztató jellegű automatikus összefoglaló. Nem hivatalos hatósági dokumentum, és nem helyettesíti az osztrák vagy magyar hivatalos közleményeket.
              </div>

              <h2>Magyar nyelvű összefoglaló</h2>
              <p>{summary_html}</p>

              <h2>Felhasznált osztrák / burgenlandi források</h2>
              <ul>
                {html_articles if html_articles else "<li>Nincs elérhető forrás.</li>"}
              </ul>

              <div class="actions">
                <button onclick="window.print()">PDF / nyomtatás</button>
              </div>
            </div>
          </body>
          </html>
          """

          def first_article(articles, source_type):
              for item in articles:
                  if item.get("source_type") == source_type:
                      return item
              return None

          def milestone_events(articles):
              events = []
              seen = set()

              def add_event(date, title, source, event_type, url=""):
                  key = re.sub(r"\W+", "", f"{date}{title}{source}".lower())[:120]
                  if key in seen:
                      return

                  seen.add(key)

                  events.append({
                      "date": date or "Dátum nélkül",
                      "title": title,
                      "source": source,
                      "type": event_type,
                      "url": url
                  })

              official = first_article(articles, "official")
              civil = first_article(articles, "civil")
              austrian = first_article(articles, "austrian")

              media_count = sum(1 for item in articles if item.get("source_type") == "media")
              austrian_count = sum(1 for item in articles if item.get("source_type") == "austrian")
              official_count = sum(1 for item in articles if item.get("source_type") == "official")
              civil_count = sum(1 for item in articles if item.get("source_type") == "civil")
              gdelt_count = sum(1 for item in articles if item.get("source_type") == "gdelt")

              if official:
                  add_event(
                      official.get("date", ""),
                      "Hivatalos / önkormányzati tájékoztató szerepel a monitoringban.",
                      official.get("source", "Hivatalos forrás"),
                      "official_notice",
                      official.get("url", "")
                  )

              if civil:
                  add_event(
                      civil.get("date", ""),
                      "Greenpeace vagy más civil forrás is megjelent az ügyben.",
                      civil.get("source", "Civil forrás"),
                      "civil_action",
                      civil.get("url", "")
                  )

              if austrian:
                  add_event(
                      austrian.get("date", ""),
                      "Osztrák vagy burgenlandi forrás is kapcsolódik az ügyhöz.",
                      austrian.get("source", "Osztrák forrás"),
                      "austrian_context",
                      austrian.get("url", "")
                  )

              if media_count >= 3:
                  add_event(
                      "Folyamatos",
                      f"Jelentős magyar médiafigyelem: legalább {media_count} releváns magyar médiatalálat szerepel a rendszerben.",
                      "Magyar médiafigyelés",
                      "media_wave",
                      ""
                  )

              if official_count or civil_count or austrian_count or media_count or gdelt_count:
                  add_event(
                      "Folyamatos",
                      f"A rendszer jelenleg {official_count} hivatalos, {civil_count} civil, {austrian_count} osztrák/burgenlandi, {media_count} magyar média és {gdelt_count} egyéb GDELT-találatot különít el.",
                      "Automatikus monitoring",
                      "system_summary",
                      ""
                  )

              if not events:
                  add_event(
                      "Folyamatos",
                      "A monitoring rendszer fut, de új, kiemelt mérföldkő nem azonosítható.",
                      "Automatikus monitoring",
                      "system",
                      ""
                  )

              return events[:8]

          collected = []

          for source in RSS_SOURCES:
              collected.extend(fetch_rss_source(source))

          for source in HTML_SOURCES:
              collected.extend(fetch_html_source(source))

          collected.extend(fetch_nyugat_targeted())
          collected.extend(fetch_targeted_hungarian_media())
          collected.extend(fetch_gdelt())

          all_news = deduplicate(collected + MANUAL_NEWS)
          all_news = sorted(all_news, key=priority, reverse=True)

          latest_news = sorted(
              all_news,
              key=sort_date_key,
              reverse=True
          )[:12]

          source_counts = {}
          source_type_counts = {}

          for item in all_news:
              source = item.get("source", "unknown")
              source_type = item.get("source_type", "unknown")

              source_counts[source] = source_counts.get(source, 0) + 1
              source_type_counts[source_type] = source_type_counts.get(source_type, 0) + 1

          summary = ai_summary(all_news)
          events = milestone_events(all_news)
          austrian_summary = ai_austrian_summary(all_news)
          austrian_html = build_austrian_html(austrian_summary)

          news_output = {
              "generated_at": now_iso(),
              "refresh_hours": 6,
              "query": QUERY,
              "mode": "rss_html_gdelt_ai_filtered_with_article_date_extraction",
              "source_counts": source_counts,
              "source_type_counts": source_type_counts,
              "summary": summary,
              "latest_articles": latest_news,
              "articles": all_news[:120]
          }

          events_output = {
              "generated_at": now_iso(),
              "mode": "milestones_from_news",
              "events": events
          }

          with open("data/news.json", "w", encoding="utf-8") as f:
              json.dump(news_output, f, ensure_ascii=False, indent=2)

          with open("data/events.json", "w", encoding="utf-8") as f:
              json.dump(events_output, f, ensure_ascii=False, indent=2)

          with open("data/austrian-summary.json", "w", encoding="utf-8") as f:
              json.dump(austrian_summary, f, ensure_ascii=False, indent=2)

          with open("data/austrian-summary.html", "w", encoding="utf-8") as f:
              f.write(austrian_html)

          print("Generated data/news.json")
          print("Generated data/events.json")
          print("Generated data/austrian-summary.json")
          print("Generated data/austrian-summary.html")
          print("Articles:", len(news_output["articles"]))
          print("Latest:", len(news_output["latest_articles"]))
          print("Austrian articles:", austrian_summary.get("count", 0))
          print("Milestone events:", len(events_output["events"]))
          print("Source counts:", source_counts)
          print("Source types:", source_type_counts)

          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/news.json data/events.json data/austrian-summary.json data/austrian-summary.html

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update news, events and Austrian summary"
            git push
          fi
