name: Update news scores

on:
  workflow_dispatch:
  push:
    paths:
      - "data/news.json"
      - "generate-news-scores.js"
      - ".github/workflows/update-news-scores.yml"
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:
  update-news-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate news scores
        run: node generate-news-scores.js

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain data/news_scores.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated news scores
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news_scores.json
          git commit -m "Update generated news scores"
          git push
